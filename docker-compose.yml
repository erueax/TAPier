# docker-compose.yml
services:
  fluent-bit:
    build: ./fluentbit
    container_name: fluent-bit
    depends_on:
      kafka-1:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy      # reject path writes straight to ES
    restart: unless-stopped

  kafka-1:
    image: apache/kafka:4.3.0
    hostname: kafka-1
    container_name: kafka-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh",
             "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Usefull to avoid kafka race with spark
  kafka-init:
    image: apache/kafka:4.3.0
    depends_on:
      kafka-1:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:29092 \
          --create --if-not-exists --topic sentences --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:29092 \
          --create --if-not-exists --topic results --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:29092 \
          --create --if-not-exists --topic word_checks --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:29092 \
          --create --if-not-exists --topic recommendations --partitions 3 --replication-factor 1
    restart: "no"

  spark:
    build: ./spark
    image: tapier-spark
    container_name: spark
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./spark/jobs:/opt/spark/work-dir/jobs:ro
      - spark-checkpoints:/checkpoints       # for persistency
    command: ["/opt/spark/bin/spark-submit", "jobs/stream_sentences.py"]

  spark-train:
    build: ./spark
    image: tapier-spark
    profiles: ["train"]
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./spark/jobs:/opt/spark/work-dir/jobs:ro
      - models:/models
    command: ["/opt/spark/bin/spark-submit", "jobs/train.py"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data   # persist indices, docs, templates
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  logstash:
    build: ./logstash
    container_name: logstash
    depends_on:
      kafka-1:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
    environment:
      - XPACK_MONITORING_ENABLED=false

  grafana:
    build: ./grafana    
    container_name: grafana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_NAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: light
      GF_SERVER_ROOT_URL: "${SITE_ADDRESS}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: scheduler
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.enabled: "true"
      ofelia.job-run.nightly-train.schedule: "@every 1m"
      ofelia.job-run.nightly-train.image: "tapier-spark"
      ofelia.job-run.nightly-train.network: "tapier_default"
      ofelia.job-run.nightly-train.volume: "${PWD}/spark/jobs:/opt/spark/work-dir/jobs:ro"
      ofelia.job-run.nightly-train.command: "/opt/spark/bin/spark-submit /opt/spark/work-dir/jobs/train.py"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    depends_on:
      - fluent-bit
      - elasticsearch
    environment:
      - DEMO_KEY=${DEMO_KEY}            
      - SITE_ADDRESS=${SITE_ADDRESS}
      - ACME_EMAIL=${ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  es-data:  
  grafana-data:    
  models:
  caddy-data:
  caddy-config:
  spark-checkpoints:




