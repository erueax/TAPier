input {
  kafka {
    bootstrap_servers => "kafka-1:29092"
    topics            => ["word_checks"]
    codec             => json
    group_id          => "logstash-word-checks"
    auto_offset_reset => "earliest"
  }
}

filter {
  # drop so the index stays clean.
  mutate { remove_field => ["@timestamp", "@version", "event_type"] }
}

output {
  elasticsearch {
    hosts              => ["http://elasticsearch:9200"]
    index              => "word_checks"
    document_id        => "%{id}"
    template           => "/usr/share/logstash/templates/word_checks.json"
    template_name      => "word_checks"
    template_overwrite => true
    template_api       => "composable"
  }
}