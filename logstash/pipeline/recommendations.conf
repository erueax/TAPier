input {
  kafka {
    bootstrap_servers => "kafka-1:29092"
    topics            => ["recommendations"]
    codec             => json
    group_id          => "logstash-recommendations"
    auto_offset_reset => "earliest"
  }
}

filter {
  mutate { remove_field => ["@timestamp", "@version"] }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "recommendations"
    document_id => "%{user_id}"     # one current doc per user; reruns overwrite
  }
  stdout { codec => rubydebug }
}