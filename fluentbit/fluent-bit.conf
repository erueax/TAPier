# fluent-bit.conf

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2100

[INPUT]
    Name    http
    Listen  0.0.0.0
    Port    9100
    Tag     sentences

# Split word_check telemetry off the sentences stream -> tag word_checks.
[FILTER]
    Name          rewrite_tag
    Match         sentences
    Rule          $event_type ^word_check$ word_checks false
    Emitter_Name  wordcheck_emitter

# Japanese gate — ONLY on real sentences.
[FILTER]
    Name    lua
    Match   sentences
    script  clean.lua
    call    clean

# Mark non-Japanese sentences as rejected.
[FILTER]
    Name          rewrite_tag
    Match         sentences
    Rule          $status ^rejected$ rejected false
    Emitter_Name  reject_emitter

# Accepted sentences -> Kafka.
[OUTPUT]
    Name              kafka
    Match             sentences
    Brokers           kafka-1:29092
    Topics            sentences
    Message_Key_Field id

# Rejected sentences -> Elasticsearch null result.
[OUTPUT]
    Name               es
    Match              rejected
    Host               elasticsearch
    Port               9200
    Index              sentence_results
    Generate_ID        off
    Id_Key             id
    Suppress_Type_Name On

[OUTPUT]
    Name              kafka
    Match             word_checks
    Brokers           kafka-1:29092
    Topics            word_checks
    Message_Key_Field lemma

# Debug.
[OUTPUT]
    Name    stdout
    Match   *
    Format  json_lines